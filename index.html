<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Setup | Ultra Sparkle Ponpon</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        
        .neon-wrapper {
            position: relative;
            max-width: 500px; width: 100%;
            padding: 4px; border-radius: 42px;
            overflow: hidden; background: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. KATMAN: DÖNEN PEMBE ÇİZGİ (TEMEL) */
        .neon-wrapper::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: conic-gradient(from 0deg, transparent 80%, #FF69B4 95%, transparent 100%);
            animation: rotateAll 3s linear infinite;
        }

        /* 2. KATMAN: GERÇEK PONPON VE SPARKLE (Garantili Yöntem) */
        .neon-wrapper::after {
            /* Buraya gerçek parıltı karakteri koyuyoruz, böylece tarayıcı 'yok' sayamaz */
            content: '✨'; 
            position: absolute;
            width: 100%; height: 100%;
            color: #fff;
            font-size: 25px;
            display: flex;
            justify-content: center;
            /* Ponponun konumu (Üst orta) */
            padding-top: 15px; 
            align-items: flex-start;
            /* Ponponun o kabarık pembe patlaması */
            text-shadow: 
                0 0 10px #fff, 
                0 0 25px #FF1493, 
                0 0 45px #FF69B4,
                0 0 60px #FF69B4;
            animation: rotateAll 3s linear infinite, sparkleBlink 0.3s infinite alternate;
            z-index: 1;
        }

        @keyframes rotateAll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Parıltıların (Sparkling) yanıp sönme efekti */
        @keyframes sparkleBlink {
            0% { opacity: 0.7; transform: scale(0.9) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.2) rotate(15deg); }
        }

        .container { 
            position: relative; width: 100%; background: #0d0d0d; 
            padding: 35px; border-radius: 39px; z-index: 2; 
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        
        h1 { font-family: 'Dancing Script', cursive; font-size: 38px; color: #FF69B4; text-shadow: 0 0 10px rgba(255, 105, 180, 0.5); }
        .subtitle { opacity: 0.7; font-size: 13px; margin-bottom: 30px; color: #FFB6C1; }
        .group-header { color: #FF69B4; font-size: 18px; text-align: left; margin: 30px 0 15px 5px; padding-left: 12px; font-weight: 600; border-left: 5px solid #FF69B4; }
        .btn { display: flex; justify-content: space-between; align-items: center; background: #141414; color: #fff; padding: 18px 25px; margin: 12px 0; text-decoration: none; border-radius: 22px; font-family: 'Dancing Script', cursive; font-size: 16px; transition: 0.3s; border: 1px solid #252525; }
        .btn:hover { background: #FF69B4; color: #fff; transform: scale(1.03); box-shadow: 0 0 20px rgba(255, 105, 180, 0.5); }
        .btn span { font-family: 'Fredoka', sans-serif; font-size: 10px; font-weight: 600; color: #FFB6C1; background: rgba(255, 105, 180, 0.1); padding: 5px 10px; border-radius: 10px; }
        footer { margin-top: 50px; font-size: 14px; opacity: 0.6; color: #FF69B4; font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="neon-wrapper">
        <div class="container">

            <a href="https://apps.microsoft.com/detail/9PB88ZKT0CDB" class="btn">Spooky View <span>EXE</span></a>
