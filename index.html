<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Setup | Smooth Neon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        
        /* === YUMUŞAK NEON AKIŞI (SMOOTH BORDER) === */
        .neon-wrapper {
            position: relative;
            max-width: 500px;
            width: 100%;
            padding: 2.5px; /* Çerçeve kalınlığı */
            border-radius: 38px;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            /* Hafif bir dış parlama desteği */
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.05);
        }

        /* Dönen Yumuşak Işık Katmanı */
        .neon-wrapper::before {
            content: '';
            position: absolute;
            width: 180%; /* Daha geniş alan ki dönüş daha yumuşak görünsün */
            height: 180%;
            /* Çizgi yerine geniş bir renk yayılımı (Smooth Transition) */
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 70%, 
                rgba(255, 105, 180, 0.6) 90%, 
                #FF69B4 100%
            );
            animation: rotateLine 5s linear infinite; /* Hızı biraz yavaşlattım (5sn) */
            filter: blur(8px); /* İşte o pürüzsüzlüğü veren anahtar! */
        }

        @keyframes rotateLine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container { 
            position: relative;
            width: 100%;
            background: #0d0d0d; 
            padding: 30px; 
            border-radius: 35px;
            z-index: 1; 
            /* Kenarları biraz daha belirginleştiren iç gölge */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        /* ============================================== */
        
        /* Önceki başlık animasyonu (Korumalı) */
        @keyframes softGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(255, 105, 180, 0.2); opacity: 0.9; }
            50% { text-shadow: 0 0 15px rgba(255, 105, 180, 0.5); opacity: 1; }
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            margin-bottom: 5px; font-size: 38px; color: #FF69B4; 
            animation: softGlow 4s infinite ease-in-out;
        }

        .subtitle { opacity: 0.7; font-size: 13px; margin-bottom: 30px; color: #FFB6C1; }
        .group-header { color: #FF69B4; font-size: 18px; text-align: left; margin: 30px 0 15px 5px; padding-left: 12px; font-weight: 600; border-left: 5px solid #FF69B4; }
        .btn { display: flex; justify-content: space-between; align-items: center; background: #141414; color: #fff; padding: 18px 25px; margin: 12px 0; text-decoration: none; border-radius: 22px; font-family: 'Dancing Script', cursive; font-size: 16px; transition: all 0.4s ease; border: 1px solid #252525; }
        .btn:hover { background: #FF69B4; color: #fff; border-color: #FFB6C1; transform: scale(1.04); box-shadow: 0 0 15px rgba(255, 105, 180, 0.4); }
        .btn span { font-family: 'Fredoka', sans-serif; font-size: 10px; font-weight: 600; color: #FFB6C1; background: rgba(255, 105, 180, 0.1); padding: 5px 10px; border-radius: 10px; }
        footer { margin-top: 50px; font-size: 14px; opacity: 0.6; color: #FF69B4; font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="neon-wrapper">
        <div class="container">
            <h1>Demon Setup Hub</h1>
            <div class="subtitle">✨ Your Magical Launcher ✨</div>

            <div class="group-header">Windows 🪟</div>
            <a href="https://github.com/bloxstraplabs/bloxstrap/releases/download/v2.10.0/Bloxstrap-v2.10.0.exe" class="btn">Bloxstrap Setup <span>EXE</span></a>
            <a href="https://cdn.discordapp.com/attachments/1272198964812320799/1272199026896535582/XMouseButtonControlSetup.2.20.5.exe" class="btn">XMouseButtonControl Setup <span>EXE</span></a>
            
            <div class="group-header">Android 🤖</div>
            <a href="https://drive.google.com/file/d/1Fr7Zp484_EN6a6BADrf0ZoNPqcoxqpnC/view?usp=drivesdk" class="btn">Ymusic <span>APK</span></a>

            <footer>🩷 Made with Love by Miya 🩷</footer>
        </div>
    </div>

</body>
</html>
